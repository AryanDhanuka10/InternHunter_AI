name: Daily Internship Hunt

on:
  schedule:
    - cron: '0 4 * * *'    # 9:30 AM IST (IST = UTC+5:30, so 9:30 IST = 04:00 UTC)
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15     # kill if stuck (e.g. SMTP hang)

    steps:
      # ── 1. Checkout ───────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip          # cache packages between runs

      # ── 3. Install deps ───────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restore DB from cache (keeps history across runs) ──
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data/internships.db
          key: internships-db-${{ runner.os }}
          restore-keys: internships-db-

      # ── 5. Run full pipeline ──────────────────────────────
      - name: Run pipeline
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          USER_NAME:      ${{ secrets.USER_NAME }}
          USER_EMAIL:     ${{ secrets.USER_EMAIL }}
          USER_COLLEGE:   ${{ secrets.USER_COLLEGE }}
          USER_BRANCH:    ${{ secrets.USER_BRANCH }}
          USER_YEAR:      ${{ secrets.USER_YEAR }}
          USER_SKILLS:    ${{ secrets.USER_SKILLS }}
          USER_GITHUB:    ${{ secrets.USER_GITHUB }}
          USER_LINKEDIN:  ${{ secrets.USER_LINKEDIN }}
        run: python -m internhunter.scheduler

      # ── 6. Run tests (catch regressions) ─────────────────
      - name: Run tests
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          USER_NAME:      ${{ secrets.USER_NAME }}
          USER_EMAIL:     ${{ secrets.USER_EMAIL }}
          USER_COLLEGE:   ${{ secrets.USER_COLLEGE }}
          USER_BRANCH:    ${{ secrets.USER_BRANCH }}
          USER_YEAR:      ${{ secrets.USER_YEAR }}
          USER_SKILLS:    ${{ secrets.USER_SKILLS }}
          USER_GITHUB:    ${{ secrets.USER_GITHUB }}
          USER_LINKEDIN:  ${{ secrets.USER_LINKEDIN }}
        run: pytest tests/ --tb=short -q

      # ── 7. Upload digest as artifact ──────────────────────
      - name: Upload digest
        if: always()          # upload even if pipeline failed
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_number }}
          path: |
            data/digest/*.html
            data/digest/*.txt
            logs/daily.log
          retention-days: 30  # keep 30 days of digests